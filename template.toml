[variables]
main_domain = "${domain}"
# Dokploy injects APP_NAME at deploy (project + template id + random suffix).
# For a shorter volume prefix, override STACK_SLUG in Environment before first Deploy.
stack_slug = "${APP_NAME}"
db_name = "wordpress"
db_user = "wordpress"
db_password = "${password:32}"
db_root_password = "${password:32}"

[config]
env = [
  "STACK_SLUG=${stack_slug}",
  "MYSQL_ROOT_PASSWORD=${db_root_password}",
  "MYSQL_DATABASE=${db_name}",
  "MYSQL_USER=${db_user}",
  "MYSQL_PASSWORD=${db_password}",
  "WORDPRESS_DB_PASSWORD=${db_password}",
  "WORDPRESS_DB_HOST=db",
  "WORDPRESS_DB_USER=${db_user}",
  "WORDPRESS_DB_NAME=${db_name}",
  "WORDPRESS_PUBLIC_URL=https://${main_domain}"
]

[[config.domains]]
serviceName = "nginx"
port = 80
host = "${main_domain}"
