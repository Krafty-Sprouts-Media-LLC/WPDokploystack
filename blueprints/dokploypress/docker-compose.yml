# =============================================================================
# docker-compose.yml (blueprint)
# DokployPress — Dokploy blueprint compose (uses pre-built GHCR images)
# Unofficial WordPress stack for Dokploy — by Krafty Sprouts Media.
# Not affiliated with or endorsed by Dokploy.
#
# @package DokployPress
# @since   2.0.0
# =============================================================================

services:
  nginx:
    image: ghcr.io/krafty-sprouts-media-llc/dokploypress-nginx:2.2.0
    pull_policy: always
    ports:
      - "80"
    environment:
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-256M}
    volumes:
      - wordpress_data:/var/www/html:ro
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - dokploy-network
      - internal
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  wordpress:
    image: ghcr.io/krafty-sprouts-media-llc/dokploypress-wordpress:2.2.0
    pull_policy: always
    # Forwards every KEY=VALUE set in Dokploy's Environment tab straight into
    # this container's process env — lets theme/plugin-specific vars (e.g. a
    # GitHub update-checker token) work via getenv() with no compose edit or
    # redeploy of this stack's images. required: false so local runs without
    # a .env file still work.
    env_file:
      - path: .env
        required: false
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=wordpress
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_DB_NAME=wordpress
      - WORDPRESS_PUBLIC_URL=${WORDPRESS_PUBLIC_URL:-}
      - WORDPRESS_MULTISITE_CONFIG=${WORDPRESS_MULTISITE_CONFIG:-}
      - WORDPRESS_CONFIG_EXTRA=
          define('WP_REDIS_HOST', 'redis');
          define('WP_REDIS_PORT', 6379);
          define('WP_CACHE', true);
          define('MC_STORAGE_HOST', 'redis');
          define('MC_STORAGE_PORT', 6379);
          define('MC_STORAGE_DB', 1);
          define('DISABLE_WP_CRON', true);
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-256M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-256M}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
      - PHP_MAX_INPUT_TIME=${PHP_MAX_INPUT_TIME:-300}
      - PHP_MAX_INPUT_VARS=${PHP_MAX_INPUT_VARS:-3000}
      - PHP_OPCACHE_MEMORY=${PHP_OPCACHE_MEMORY:-128}
      - PHP_OPCACHE_MAX_FILES=${PHP_OPCACHE_MAX_FILES:-4000}
      - PHP_OPCACHE_VALIDATE=${PHP_OPCACHE_VALIDATE:-0}
      # Multisite — set to 'subfolder' or 'subdomain' to enable Network Setup.
      # Leave as 'disabled' for standard single-site installs.
      - WP_MULTISITE_MODE=${WP_MULTISITE_MODE:-disabled}
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: mariadb:10.6
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wordpress
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  redis:
    image: redis:alpine
    command: redis-server --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  plugin-installer:
    image: ghcr.io/krafty-sprouts-media-llc/dokploypress-plugin-installer:2.2.0
    pull_policy: always
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      wordpress:
        condition: service_healthy
    networks:
      - internal
    restart: on-failure

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - UPLOAD_LIMIT=256M
    ports:
      - "80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dokploy-network
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # WP-Cron sidecar — always-on. Triggers wp-cron.php every 5 minutes via
  # the internal Docker network so WP scheduled events run reliably without
  # relying on visitor traffic or exposing an external HTTP endpoint.
  # DISABLE_WP_CRON=true in wp-config prevents WordPress from spawning its
  # own pseudo-cron on page load, avoiding duplicate runs.
  # ---------------------------------------------------------------------------
  wp-cron:
    image: alpine:latest
    command:
      - /bin/sh
      - -c
      - |
        echo 'WP-Cron sidecar started. Interval: 300s'
        while true; do
          if wget -q -O /dev/null 'http://nginx/wp-cron.php?doing_wp_cron' 2>&1; then
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] wp-cron triggered"
          else
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] wp-cron request failed (nginx may still be starting)"
          fi
          sleep "${WP_CRON_INTERVAL:-300}"
        done
    depends_on:
      nginx:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  sftp:
    profiles:
      - tools
    image: atmoz/sftp:latest
    command: "${SFTP_USER:-wpuser}:${SFTP_PASSWORD:-changeme_set_in_dokploy}:${SFTP_UID:-33}"
    volumes:
      - wordpress_data:/home/${SFTP_USER:-wpuser}/public_html
    ports:
      - "${SFTP_PORT:-2222}:22"
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge

volumes:
  wordpress_data:
    name: ${STACK_SLUG:-${COMPOSE_PROJECT_NAME:-wordpress}}_data
  db_data:
    name: ${STACK_SLUG:-${COMPOSE_PROJECT_NAME:-wordpress}}_db_data
  redis_data:
    name: ${STACK_SLUG:-${COMPOSE_PROJECT_NAME:-wordpress}}_redis_data
