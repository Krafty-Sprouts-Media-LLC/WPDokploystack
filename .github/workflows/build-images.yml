name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'wordpress/**'
      - 'nginx/**'
      - 'plugin-installer/**'
      - 'docker-compose.yml'
      - 'blueprints/**/docker-compose.yml'
      - '.github/workflows/build-images.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase image prefix
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/${OWNER_LC}/dokploy-wp" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read stack version
        id: version
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' meta.json | head -1 | cut -d'"' -f4)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Stack version: ${VERSION}"

      - name: Build and push WordPress image
        uses: docker/build-push-action@v5
        with:
          context: ./wordpress
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-wordpress:latest
            ${{ env.IMAGE_PREFIX }}-wordpress:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-nginx:latest
            ${{ env.IMAGE_PREFIX }}-nginx:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Plugin Installer image
        uses: docker/build-push-action@v5
        with:
          context: ./plugin-installer
          push: true
          no-cache: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-plugin-installer:latest
            ${{ env.IMAGE_PREFIX }}-plugin-installer:${{ steps.version.outputs.version }}
          provenance: false

      - name: Update blueprint image tags to current version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BLUEPRINT="blueprints/ksm-wp-stack/docker-compose.yml"
          # Replace any existing version tag (x.y.z) on the three custom images.
          # Use # as the sed delimiter — | cannot be used because the ERE alternation
          # (nginx|wordpress|plugin-installer) contains literal pipe characters.
          sed -i -E \
            "s#(ghcr\.io/krafty-sprouts-media-llc/dokploy-wp-(nginx|wordpress|plugin-installer)):[0-9]+\.[0-9]+\.[0-9]+#\1:${VERSION}#g" \
            "${BLUEPRINT}"
          echo "Blueprint image tags updated to ${VERSION}:"
          grep "ghcr.io/krafty-sprouts-media-llc" "${BLUEPRINT}"

      - name: Commit updated blueprint image tags
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update blueprint image tags to ${{ steps.version.outputs.version }} [skip ci]"
          file_pattern: blueprints/ksm-wp-stack/docker-compose.yml
