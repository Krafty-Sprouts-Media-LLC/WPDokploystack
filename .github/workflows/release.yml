name: Create GitHub Release on Tag

# =============================================================================
# release.yml
# Automatically creates a GitHub Release with formatted notes whenever a
# version tag (v*.*.*) is pushed. Extracts the relevant section from
# CHANGELOG.md and uses it as the release body.
#
# @package KSM-WPDokploystack
# @since   1.7.0
# =============================================================================

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Extract changelog section for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Extract the section between this version's header and the next
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          if [ -z "${NOTES}" ]; then
            NOTES="See CHANGELOG.md for details."
          fi

          # Write to file to handle multiline content safely
          echo "${NOTES}" > release_notes.txt
          echo "Release notes extracted for v${VERSION}"

      - name: Determine if pre-release
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Treat 0.x.x as pre-release
          if [[ "${VERSION}" == 0.* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "DokployPress ${{ steps.version.outputs.tag }}"
          body_path: release_notes.txt
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          make_latest: true
          generate_release_notes: false
